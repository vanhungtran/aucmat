url: https://vanhungtran.github.io/aucmat
template:
  bootstrap: 5
  bootswatch: flatly
  light-switch: true
  math-rendering: mathjax
  includes:
    before_body: |
      <p style="text-align:center; margin-top: 0.6em; margin-bottom: 0;">
        <img src="https://vanhungtran.github.io/aucmat/logo.png"
             alt="aucmat logo" style="width:90px; max-width:30%;" />
      </p>

title: aucmat
subtitle: Scalable ROC Analysis for High-Dimensional Biomarker Matrices

authors:
  Lucas VH Huynh-Tran:
    href: https://github.com/vanhungtran

development:
  mode: auto

reference:
- title: Matrix Screening
  desc: Screen a biomarker matrix against a binary outcome
  contents:
  - aucmat

- title: Data Simulation
  desc: Generate synthetic biomarker data with controlled AUC and correlation
  contents:
  - simulate_auc_matrix
  - simulate_auc_copula
  - simulate_hurdle_auc
  - validate_simulation
  - generate_data_probit
  - generate_data_analytical
  - generate_auc_vector
  - generate_auc_cor_vector
  - simulate_auc_correlation

- title: Comparisons & Stability
  desc: Compare biomarker AUCs and assess ranking stability
  contents:
  - compare_auc
  - compare_auc_global
  - auc_stability
  - roc_test

- title: Visualization
  desc: Publication-quality graphics -- every ROC/panel-ROC plot shows
    bootstrap confidence ribbons by default
  contents:
  - plot_auc_rank
  - plot_auc_volcano
  - plot_auc_forest
  - plot_auc_stability
  - plot_roc_top
  - plot_roc_smooth
  - plot_auc_pr
  - plot_correlation_heatmap
  - plot.aucmat_compare
  - plot.aucmat_simulation
  - theme_aucmat
  - scale_colour_aucmat_direction
  - scale_fill_aucmat_direction
  - scale_colour_aucmat_significance

- title: Multivariable Panels
  desc: Combine biomarkers into a single score, with honest nested
    cross-validation
  contents:
  - fit_auc_panel
  - predict.aucmat_panel
  - plot_roc_panel
  - compare_panel_auc

- title: Cross-Validation & Study Planning
  contents:
  - cv_aucmat
  - power_auc_matrix
  - aucmat_by
  - aucmat_multiclass

- title: Hurdle-AUC
  desc: Two-stage model for zero-inflated biomarker data
  contents:
  - hurdle_auc
  - simulate_hurdle_auc
  - plot_hurdle_diagnostics

- title: Example Data
  desc: Real biomarker data shipped with the package
  contents:
  - beatmg_baseline
  - beatmg_ontreatment

- title: Deprecated
  desc: Functions retained for backward compatibility
  contents:
  - tableroc
  - plot_roc_with_combos

articles:
- title: Get Started
  navbar: ~
  contents:
  - introduction-to-aucmat

- title: Tutorials
  desc: In-depth, task-focused guides
  contents:
  - simulating-biomarker-data
  - real-data-beatmg
  - practical-screening

- title: Background
  desc: Methodology and citation
  contents:
  - aucmat-manuscript

home:
  links:
  - text: pROC package
    href: https://xrobin.github.io/pROC/
