<!-- ================================================================
     aucmat vignette layout — reading bar + back-to-top + GLightbox
     ================================================================ -->

<!-- Reading progress bar -->
<div id="rpb"></div>

<!-- Back to top -->
<button id="btt" title="Back to top" aria-label="Back to top">&#8593;</button>

<!-- GLightbox CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

<style>
/* ── Reading progress bar ─────────────────────────── */
#rpb {
  position: fixed; top: 0; left: 0; height: 3px; width: 0;
  background: linear-gradient(90deg, #2c7da0, #61a5c2);
  z-index: 20000; transition: width .12s linear;
}

/* ── Back to top ──────────────────────────────────── */
#btt {
  position: fixed; bottom: 2em; right: 1.8em; width: 42px; height: 42px;
  background: #2c7da0; color: #fff; border: none; border-radius: 50%;
  font-size: 20px; line-height: 42px; text-align: center; cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity .28s, background .2s, transform .2s;
  box-shadow: 0 3px 12px rgba(0,0,0,.28); z-index: 9000;
}
#btt.show { opacity: 1; pointer-events: auto; }
#btt:hover { background: #61a5c2; transform: translateY(-3px); }

/* ── Figure hover lift ────────────────────────────── */
p img, .figure img, main img, article img {
  cursor: zoom-in;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1),
              box-shadow .28s ease, filter .28s ease;
}
p img:hover, .figure img:hover, main img:hover, article img:hover {
  transform: scale(1.025) translateY(-4px);
  box-shadow: 0 14px 40px rgba(44,125,160,.3);
  filter: brightness(1.04) saturate(1.06);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>
(function(){
/* ── Progress bar ────────────────────────────────── */
var rpb = document.getElementById('rpb');
window.addEventListener('scroll', function() {
  var s = document.documentElement;
  rpb.style.width = Math.min((s.scrollTop / (s.scrollHeight - s.clientHeight)) * 100, 100) + '%';
}, { passive: true });

/* ── Back to top ─────────────────────────────────── */
var btt = document.getElementById('btt');
window.addEventListener('scroll', function() {
  btt.classList.toggle('show', window.scrollY > 480);
}, { passive: true });
btt.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

/* ── GLightbox: wrap images in <a class="lightbox"> ─ */
function initLightbox() {
  var images = document.querySelectorAll('img[src]');
  images.forEach(function(img) {
    if (img.dataset.lbx) return;
    if (img.closest && (img.closest('nav') || img.closest('.navbar') ||
        img.closest('.glightbox'))) return;
    if (!img.src || img.src.indexOf('data:image/svg') === 0) return;
    if (img.naturalWidth < 60 && img.naturalHeight < 60) return;
    img.dataset.lbx = '1';

    var parent = img.parentNode;
    if (parent.tagName === 'A') { parent.classList.add('lightbox'); return; }

    var a = document.createElement('a');
    a.href = img.src;
    a.className = 'lightbox';
    a.setAttribute('data-gallery', 'aucmat-gallery');
    if (img.alt) a.setAttribute('data-title', img.alt);
    parent.insertBefore(a, img);
    a.appendChild(img);
  });

  if (typeof GLightbox !== 'undefined') {
    window._aucmatLightbox = GLightbox({
      closeEffect: 'zoom',
      descPosition: 'bottom',
      loop: false,
      openEffect: 'zoom',
      selector: '.lightbox'
    });
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLightbox);
} else {
  initLightbox();
}
})();
</script>
