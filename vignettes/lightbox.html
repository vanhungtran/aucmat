<!-- ================================================================
     aucmat vignette layout — branded banner + lightbox + extras
     ================================================================ -->

<!-- Reading progress bar -->
<div id="rpb"></div>

<!-- Back to top -->
<button id="btt" title="Back to top" aria-label="Back to top">&#8593;</button>

<!-- Lightbox overlay -->
<div id="lbx-overlay">
  <img id="lbx-img" src="" alt="">
</div>
<button id="lbx-close" title="Close (Esc)">&times;</button>
<button id="lbx-zoom-in"  title="Zoom in">+</button>
<button id="lbx-zoom-out" title="Zoom out">&minus;</button>
<button id="lbx-reset"    title="Reset">&#8634;</button>

<style>
/* ── Reading progress bar ─────────────────────────── */
#rpb {
  position:fixed;top:0;left:0;height:3px;width:0;
  background:linear-gradient(90deg,#2c7da0,#61a5c2);
  z-index:20000;transition:width .12s linear;
}

/* ── Back to top ──────────────────────────────────── */
#btt {
  position:fixed;bottom:2em;right:1.8em;width:42px;height:42px;
  background:#2c7da0;color:#fff;border:none;border-radius:50%;
  font-size:20px;line-height:42px;text-align:center;cursor:pointer;
  opacity:0;pointer-events:none;transition:opacity .28s,background .2s,transform .2s;
  box-shadow:0 3px 12px rgba(0,0,0,.28);z-index:9000;
}
#btt.show {opacity:1;pointer-events:auto;}
#btt:hover {background:#61a5c2;transform:translateY(-3px);}

/* ── Lightbox ─────────────────────────────────────── */
#lbx-overlay {
  display:none;position:fixed;inset:0;z-index:99999;
  background:rgba(20,40,55,.94);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);cursor:zoom-out;
}
#lbx-overlay.active {display:flex;align-items:center;justify-content:center;}
#lbx-overlay img {
  max-width:92vw;max-height:90vh;border-radius:8px;
  box-shadow:0 12px 48px rgba(0,0,0,.6);cursor:default;
}
#lbx-close {
  position:fixed;top:16px;right:20px;z-index:100001;
  color:#fff;font-size:32px;cursor:pointer;opacity:.7;
  background:none;border:none;line-height:1;
}
#lbx-close:hover {opacity:1;}
#lbx-zoom-in,#lbx-zoom-out,#lbx-reset {
  position:fixed;right:20px;z-index:100001;
  color:#fff;font-size:20px;cursor:pointer;opacity:.6;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:6px;width:32px;height:32px;text-align:center;line-height:30px;
}
#lbx-zoom-in{top:60px}#lbx-zoom-out{top:98px}#lbx-reset{top:136px}
#lbx-zoom-in:hover,#lbx-zoom-out:hover,#lbx-reset:hover{opacity:1;background:rgba(255,255,255,.2);}

/* ── Figure hover effect ──────────────────────────── */
p img,.figure img,main img,article img{cursor:zoom-in;transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s ease,filter .28s ease;}
p img:hover,.figure img:hover,main img:hover,article img:hover{transform:scale(1.025) translateY(-4px);box-shadow:0 14px 40px rgba(44,125,160,.3);filter:brightness(1.04) saturate(1.06);}
</style>

<script>
(function(){
/* ── Progress bar ────────────────────────────────── */
var rpb=document.getElementById('rpb');
window.addEventListener('scroll',function(){var s=document.documentElement;rpb.style.width=Math.min((s.scrollTop/(s.scrollHeight-s.clientHeight))*100,100)+'%';},{passive:true});

/* ── Back to top ─────────────────────────────────── */
var btt=document.getElementById('btt');
window.addEventListener('scroll',function(){btt.classList.toggle('show',window.scrollY>480);},{passive:true});
btt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

/* ── Lightbox ────────────────────────────────────── */
var overlay=document.getElementById('lbx-overlay'),lbxImg=document.getElementById('lbx-img'),scale=1,MIN_SCALE=.3,MAX_SCALE=8,STEP=.5;
function open(src){lbxImg.src=src;scale=1;lbxImg.style.transform='scale(1)';overlay.classList.add('active');document.body.style.overflow='hidden';}
function close(){overlay.classList.remove('active');document.body.style.overflow='';lbxImg.src='';scale=1;}
function zoomIn(){scale=Math.min(MAX_SCALE,scale+STEP);apply();}
function zoomOut(){scale=Math.max(MIN_SCALE,scale-STEP);apply();}
function reset(){scale=1;apply();}
function apply(){lbxImg.style.transform='scale('+scale+')';}
overlay.addEventListener('click',function(e){if(e.target===overlay)close();});
overlay.addEventListener('wheel',function(e){e.preventDefault();if(e.deltaY<0)zoomIn();else zoomOut();},{passive:false});
document.getElementById('lbx-close').addEventListener('click',close);
document.getElementById('lbx-zoom-in').addEventListener('click',zoomIn);
document.getElementById('lbx-zoom-out').addEventListener('click',zoomOut);
document.getElementById('lbx-reset').addEventListener('click',reset);
document.addEventListener('keydown',function(e){if(!overlay.classList.contains('active'))return;if(e.key==='Escape')close();if(e.key==='+'||e.key==='=')zoomIn();if(e.key==='-')zoomOut();if(e.key==='0')reset();});
document.addEventListener('DOMContentLoaded',function(){var images=document.querySelectorAll('img[src]');images.forEach(function(img){if(img.id==='lbx-img')return;if(img.closest&&(img.closest('#lbx-overlay')||img.closest('nav')||img.closest('.navbar')))return;if(!img.src||img.src.startsWith('data:image/svg'))return;img.style.cursor='zoom-in';img.addEventListener('click',function(){open(img.src);});});});
})();
</script>
