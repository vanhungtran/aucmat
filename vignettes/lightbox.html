<style>
#lbx-overlay {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(20,40,55,.94); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px); cursor: zoom-out;
}
#lbx-overlay.active { display: flex; align-items: center; justify-content: center; }
#lbx-overlay img {
  max-width: 92vw; max-height: 90vh; border-radius: 8px;
  box-shadow: 0 12px 48px rgba(0,0,0,.6); cursor: default;
}
#lbx-close {
  position: fixed; top: 16px; right: 20px; z-index: 100001;
  color: #fff; font-size: 32px; cursor: pointer; opacity: .7;
  background: none; border: none; line-height: 1;
}
#lbx-close:hover { opacity: 1; }
#lbx-zoom-in, #lbx-zoom-out, #lbx-reset {
  position: fixed; right: 20px; z-index: 100001;
  color: #fff; font-size: 22px; cursor: pointer; opacity: .6;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px; width: 34px; height: 34px; text-align: center; line-height: 32px;
}
#lbx-zoom-in  { top: 60px; }
#lbx-zoom-out { top: 100px; }
#lbx-reset   { top: 140px; }
#lbx-zoom-in:hover, #lbx-zoom-out:hover, #lbx-reset:hover { opacity: 1; background: rgba(255,255,255,.2); }
/* make all content images clickable */
p img, .figure img, main img, article img { cursor: zoom-in; }
</style>

<div id="lbx-overlay">
  <img id="lbx-img" src="" alt="">
</div>
<button id="lbx-close" title="Close (Esc)">&times;</button>
<button id="lbx-zoom-in"  title="Zoom in">+</button>
<button id="lbx-zoom-out" title="Zoom out">&minus;</button>
<button id="lbx-reset"    title="Reset">&circlearrowleft;</button>

<script>
(function() {
  var overlay = document.getElementById('lbx-overlay');
  var lbxImg  = document.getElementById('lbx-img');
  var scale   = 1;
  var MIN_SCALE = 0.3, MAX_SCALE = 8, STEP = 0.5;

  function open(src) {
    lbxImg.src = src;
    scale = 1;
    lbxImg.style.transform = 'scale(1)';
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    lbxImg.src = '';
    scale = 1;
  }

  function zoomIn()  { scale = Math.min(MAX_SCALE, scale + STEP); apply(); }
  function zoomOut() { scale = Math.max(MIN_SCALE, scale - STEP); apply(); }
  function reset()   { scale = 1; apply(); }
  function apply()   { lbxImg.style.transform = 'scale(' + scale + ')'; }

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) close();
  });
  overlay.addEventListener('wheel', function(e) {
    e.preventDefault();
    if (e.deltaY < 0) zoomIn(); else zoomOut();
  }, { passive: false });

  document.getElementById('lbx-close').addEventListener('click', close);
  document.getElementById('lbx-zoom-in').addEventListener('click', zoomIn);
  document.getElementById('lbx-zoom-out').addEventListener('click', zoomOut);
  document.getElementById('lbx-reset').addEventListener('click', reset);

  document.addEventListener('keydown', function(e) {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'Escape') close();
    if (e.key === '+' || e.key === '=') zoomIn();
    if (e.key === '-') zoomOut();
    if (e.key === '0') reset();
  });

  // Wire up all content images on load
  document.addEventListener('DOMContentLoaded', function() {
    var images = document.querySelectorAll('img[src]');
    images.forEach(function(img) {
      if (img.id === 'lbx-img') return;
      if (img.closest && (img.closest('#lbx-overlay') || img.closest('nav') || img.closest('.navbar'))) return;
      if (!img.src || img.src.startsWith('data:image/svg')) return;
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', function() { open(img.src); });
    });
  });
})();
</script>
